<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loading... | DRS Softlabs</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%231a7a52'/><path d='M16 4L6 9v14l10 5 10-5V9L16 4z' fill='none' stroke='white' stroke-width='2'/></svg>" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Inter',sans-serif; background:#060f1a; color:#fff;
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; overflow:hidden;
    }
    .loader-wrap {
      text-align:center; max-width:480px; padding:40px 24px;
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

    .loader-icon-wrap { position:relative; width:120px; height:120px; margin:0 auto 24px; }
    .loader-icon {
      width:80px; height:80px; border-radius:20px;
      display:flex; align-items:center; justify-content:center;
      font-size:36px; position:absolute; top:20px; left:20px; z-index:2;
      animation: iconPulse 1.5s ease-in-out infinite;
    }
    /* Orbit ring 1 */
    .orbit-1 {
      position:absolute; inset:0; border-radius:50%;
      border:1.5px dashed rgba(255,255,255,0.08);
      animation: spin 8s linear infinite;
    }
    .orbit-1::before {
      content:''; position:absolute; top:-4px; left:50%; margin-left:-4px;
      width:8px; height:8px; border-radius:50%;
      background:var(--accent-color, #22c47a);
      box-shadow: 0 0 12px var(--accent-color, #22c47a);
    }
    /* Orbit ring 2 */
    .orbit-2 {
      position:absolute; inset:-15px; border-radius:50%;
      border:1px dashed rgba(255,255,255,0.04);
      animation: spin 12s linear infinite reverse;
    }
    .orbit-2::before {
      content:''; position:absolute; bottom:-3px; left:50%; margin-left:-3px;
      width:6px; height:6px; border-radius:50%;
      background:rgba(255,179,0,0.6);
      box-shadow: 0 0 8px rgba(255,179,0,0.4);
    }
    /* Glow behind icon */
    .loader-glow {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:100px; height:100px; border-radius:50%; z-index:0;
      filter:blur(30px); animation: glowPulse 2s ease-in-out infinite;
    }
    @keyframes glowPulse {
      0%,100% { opacity:0.3; transform:translate(-50%,-50%) scale(1); }
      50% { opacity:0.5; transform:translate(-50%,-50%) scale(1.15); }
    }
    .loader-icon::after {
      content:''; position:absolute; inset:-4px; border-radius:24px;
      border:2px solid transparent; border-top-color:rgba(255,255,255,0.15);
      animation: spin 1.5s linear infinite;
    }
    @keyframes iconPulse {
      0%,100% { transform:scale(1); }
      50% { transform:scale(1.05); }
    }
    @keyframes spin { to { transform:rotate(360deg); } }

    .loader-brand { font-size:28px; font-weight:900; letter-spacing:-0.5px; margin-bottom:4px; }
    .loader-sub { font-size:12px; color:rgba(255,255,255,0.4); letter-spacing:2px; text-transform:uppercase; font-weight:600; margin-bottom:32px; }

    .loader-bar {
      width:200px; height:3px; border-radius:3px; background:rgba(255,255,255,0.06);
      margin:0 auto 32px; overflow:hidden;
    }
    .loader-bar-fill {
      height:100%; border-radius:3px; width:20%;
      animation: barSlide 1.5s ease-in-out infinite;
    }
    @keyframes barSlide {
      0% { width:10%; margin-left:0; }
      50% { width:50%; margin-left:25%; }
      100% { width:10%; margin-left:90%; }
    }

    .loader-quote {
      font-size:15px; font-weight:500; color:rgba(255,255,255,0.65);
      line-height:1.6; min-height:52px;
      display:flex; align-items:center; justify-content:center;
      animation: quoteFade 4s ease-in-out infinite;
    }
    @keyframes quoteFade { 0%,100% { opacity:0.4; } 30%,70% { opacity:1; } }

    .loader-status {
      margin-top:24px; font-size:12px; color:rgba(255,255,255,0.25);
      display:flex; align-items:center; justify-content:center; gap:8px;
    }
    .loader-status .dot {
      width:6px; height:6px; border-radius:50%; background:#22c47a;
      animation: dotPulse 1s ease-in-out infinite;
    }
    @keyframes dotPulse {
      0%,100% { opacity:0.4; transform:scale(0.8); }
      50% { opacity:1; transform:scale(1.2); }
    }

    .loader-footer {
      position:fixed; bottom:20px; left:0; right:0; text-align:center;
      font-size:11px; color:rgba(255,255,255,0.15); letter-spacing:1px;
    }

    /* Particles */
    .particle {
      position:fixed; border-radius:50%; pointer-events:none;
      background:rgba(34,196,122,0.15);
      animation: particleFloat 8s ease-in-out infinite;
    }
    @keyframes particleFloat {
      0%,100% { transform:translateY(0) translateX(0); opacity:0.1; }
      50% { transform:translateY(-30px) translateX(15px); opacity:0.3; }
    }
  </style>
</head>
<body>
  <!-- Particles -->
  <div class="particle" style="width:4px;height:4px;top:20%;left:15%;animation-delay:0s"></div>
  <div class="particle" style="width:3px;height:3px;top:40%;right:20%;animation-delay:1s"></div>
  <div class="particle" style="width:5px;height:5px;top:60%;left:25%;animation-delay:2s"></div>
  <div class="particle" style="width:3px;height:3px;top:30%;right:30%;animation-delay:3s"></div>
  <div class="particle" style="width:4px;height:4px;top:70%;left:40%;animation-delay:1.5s"></div>
  <div class="particle" style="width:3px;height:3px;top:50%;right:10%;animation-delay:2.5s"></div>

  <div class="loader-wrap">
    <div class="loader-icon-wrap">
      <div class="loader-glow" id="loader-glow" style="background:rgba(26,122,82,0.4)"></div>
      <div class="orbit-1" style="--accent-color:#22c47a"></div>
      <div class="orbit-2"></div>
      <div class="loader-icon" id="loader-icon" style="background:linear-gradient(135deg,#1a7a52,#0d4f35);box-shadow:0 8px 32px rgba(26,122,82,0.4)">&#128138;</div>
    </div>
    <div class="loader-brand" id="loader-brand">Loading...</div>
    <div class="loader-sub" id="loader-sub">Preparing your experience</div>
    <div class="loader-bar"><div class="loader-bar-fill" id="loader-bar" style="background:linear-gradient(90deg,#22c47a,#fbbf24)"></div></div>
    <div class="loader-quote" id="loader-quote">AI-powered software for Indian businesses</div>
    <div class="loader-status"><span class="dot"></span> <span id="loader-status">Connecting to server...</span></div>
  </div>

  <div class="loader-footer">DRS Softlabs &middot; Digital Retail Solutions</div>

  <script>
    // Get product from URL params
    const params = new URLSearchParams(window.location.search);
    const product = params.get('product') || 'aushadhi';
    const url = params.get('url') || '';

    // Product-specific branding
    const products = {
      neoshala: {
        icon: '&#127891;',
        name: 'NeoShala',
        sub: 'The New Age School Platform',
        color: '#1565C0',
        colorDark: '#0D47A1',
        barColor: 'linear-gradient(90deg,#1565C0,#FFB300)',
        url: 'https://neo-shala.vercel.app',
        quotes: [
          "Empowering education, one click at a time...",
          "35+ modules designed for modern schools",
          "AI-powered attendance & fee analytics",
          "From admissions to certificates — automated",
          "Smart dashboards for smarter decisions",
          "10+ languages for every Indian school",
          "WhatsApp fee reminders that parents love",
          "Building the future of Indian education",
          "Preparing your school dashboard...",
          "Managing 500+ schools across India",
        ],
        statuses: [
          "Waking up the server...",
          "Loading school modules...",
          "Preparing your dashboard...",
          "Almost ready...",
        ]
      },
      aushadhi: {
        icon: '&#128138;',
        name: 'Aushadhi',
        sub: 'Smart Pharmacy Management',
        color: '#1a7a52',
        colorDark: '#0d4f35',
        barColor: 'linear-gradient(90deg,#22c47a,#fbbf24)',
        url: 'https://aushadhi-kappa.vercel.app',
        quotes: [
          "Health is wealth — managing it smartly is Aushadhi",
          "3-click GST billing in under 10 seconds",
          "AI-powered expiry alerts save you lakhs",
          "Smart billing, smarter business",
          "Every prescription tells a story of care",
          "10+ Indian languages for every pharmacy",
          "GST, CGST, SGST — calculated in a blink",
          "Built for Indian pharmacies, by Indians",
          "Syncing your inventory in real-time...",
          "Tracking batches, expiry & stock automatically",
        ],
        statuses: [
          "Waking up the server...",
          "Loading pharmacy modules...",
          "Preparing your POS system...",
          "Almost ready...",
        ]
      }
    };

    const p = products[product] || products.aushadhi;
    const targetUrl = url || p.url;

    // Set branding
    document.getElementById('loader-icon').innerHTML = p.icon;
    document.getElementById('loader-icon').style.background = `linear-gradient(135deg,${p.color},${p.colorDark})`;
    document.getElementById('loader-icon').style.boxShadow = `0 8px 32px ${p.color}60`;
    document.getElementById('loader-brand').textContent = p.name;
    document.getElementById('loader-sub').textContent = p.sub;
    document.getElementById('loader-bar').style.background = p.barColor;
    document.title = `Loading ${p.name}... | DRS Softlabs`;
    document.body.style.background = product === 'neoshala' ? '#0a1628' : '#060f1a';
    document.getElementById('loader-glow').style.background = `${p.color}60`;
    document.querySelector('.orbit-1').style.setProperty('--accent-color', p.color);

    // Rotate quotes
    let qi = 0;
    const quoteEl = document.getElementById('loader-quote');
    setInterval(() => { qi = (qi + 1) % p.quotes.length; quoteEl.textContent = p.quotes[qi]; }, 3000);

    // Rotate status
    let si = 0;
    const statusEl = document.getElementById('loader-status');
    setInterval(() => { si = (si + 1) % p.statuses.length; statusEl.textContent = p.statuses[si]; }, 4000);

    // Ping product — redirect the INSTANT it responds. No waiting.
    let done = false;

    function go() {
      if (done) return;
      done = true;
      window.location.href = targetUrl;
    }

    // Keep pinging every 2s until server responds
    function ping() {
      if (done) return;
      fetch(targetUrl, { method: 'HEAD', mode: 'no-cors' })
        .then(() => go())
        .catch(() => {
          statusEl.textContent = 'Server is waking up... hang tight!';
          setTimeout(ping, 2000);
        });
    }
    ping();

    // Safety: if ping never works, force redirect after 15s
    setTimeout(go, 15000);
  </script>
</body>
</html>
